site_name: rightsize
site_description: Testcontainers-style integration testing on microsandbox microVMs. No Docker required.
repo_url: https://github.com/ngriaznov/rightsize-kotlin
repo_name: ngriaznov/rightsize-kotlin
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - '.'
        - 'docs'
      check_paths: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts:
      - Containers: concepts/containers.md
      - Wait Strategies: concepts/wait-strategies.md
      - Networking: concepts/networking.md
      - Files & Memory: concepts/files-and-memory.md
  - Backends: backends.md
  - Modules:
      - Overview: modules/index.md
      - Redis: modules/redis.md
      - ArangoDB: modules/arangodb.md
      - Memcached: modules/memcached.md
      - MongoDB: modules/mongodb.md
      - PostgreSQL: modules/postgresql.md
      - MySQL: modules/mysql.md
      - MariaDB: modules/mariadb.md
      - Redpanda: modules/redpanda.md
      - Kafka: modules/kafka.md
      - RabbitMQ: modules/rabbitmq.md
      - ClickHouse: modules/clickhouse.md
      - Apache Pinot: modules/pinot.md
      - Spring Cloud Config: modules/spring-cloud-config.md
      - WireMock: modules/wiremock.md
      - Keycloak: modules/keycloak.md
      - Neo4j: modules/neo4j.md
      - Floci: modules/floci.md
      - Flink: modules/flink.md
  - Troubleshooting: troubleshooting.md
  - How It Works: how-it-works.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ngriaznov/rightsize-kotlin
