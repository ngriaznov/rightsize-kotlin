name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # Weekly run: integration tests pin real upstream artifacts (the msb release,
  # container image tags) that can drift or disappear between pushes — a scheduled
  # run surfaces that breakage without waiting for the next commit.
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build

  msb-linux:
    runs-on: ubuntu-latest   # GitHub-hosted runners expose /dev/kvm
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      # Image-cache warming is incremental: registries rate-limit the runners'
      # shared IPs, so each run restores the newest prior cache, pulls what the
      # quota allows, and saves its grown copy even on failure — after a few
      # runs the cache is warm and pulls stop entirely.
      - uses: actions/cache/restore@v4
        with:
          path: ~/.microsandbox/cache
          key: msb-images-${{ runner.os }}-${{ github.run_id }}
          restore-keys: msb-images-${{ runner.os }}-
      - run: RIGHTSIZE_BACKEND=microsandbox ./gradlew integrationTest
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.microsandbox/cache
          key: msb-images-${{ runner.os }}-${{ github.run_id }}

  msb-windows:
    runs-on: windows-2025   # WHP is pre-enabled on this image (confirmed on windows-2022 and
                            # windows-2025 in the windows-spike branch's spike workflow) — no
                            # enablement step needed, unlike msb-linux's KVM udev rule.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/cache/restore@v4
        with:
          path: ~/.microsandbox/cache
          key: msb-images-${{ runner.os }}-${{ github.run_id }}
          restore-keys: msb-images-${{ runner.os }}-
      # --max-workers=1 serializes the per-module integrationTest tasks (the repo sets
      # org.gradle.parallel=true, which otherwise runs them concurrently): msb on Windows
      # has a database-migration race under concurrent sandbox creation, so sandboxes
      # must be created one at a time on this runner.
      - shell: bash
        run: RIGHTSIZE_BACKEND=microsandbox ./gradlew integrationTest --max-workers=1
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.microsandbox/cache
          key: msb-images-${{ runner.os }}-${{ github.run_id }}

  # No msb-macos job: GitHub's hosted Apple Silicon runners are themselves VMs
  # without nested virtualization, so Hypervisor.framework VM creation fails
  # (msb: build_microvm VmSetup(VmCreate)). macOS support is verified on real
  # Apple Silicon hardware; a self-hosted mac runner could restore CI coverage.
  docker-fallback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      # Image cache: warm loads beat re-pulls and keep registry rate limits out
      # of the picture entirely. Cache key = hash of the pinned image list file.
      - name: Restore docker image cache
        id: docker-image-cache
        uses: actions/cache@v4
        with:
          path: ~/docker-image-cache
          key: docker-images-${{ hashFiles('.github/docker-images.txt') }}
      - name: Load cached images
        if: steps.docker-image-cache.outputs.cache-hit == 'true'
        run: for f in ~/docker-image-cache/*.tar; do docker load -i "$f"; done
      - run: RIGHTSIZE_BACKEND=docker ./gradlew integrationTest
      - name: Save images to cache (first run only)
        if: steps.docker-image-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/docker-image-cache
          while read -r img; do
            [ -z "$img" ] && continue
            docker pull "$img" >/dev/null 2>&1 || true
            docker save "$img" -o ~/docker-image-cache/"$(echo "$img" | tr '/:' '__')".tar || true
          done < .github/docker-images.txt
