# Uploads a staged deployment to the Maven Central Portal. Manual trigger only,
# and USER_MANAGED staging on top of that: after this workflow succeeds, the
# deployment still has to be released by hand at central.sonatype.com — nothing
# goes public from CI alone. See .github/RELEASING.md for the full procedure.
name: release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-to-central:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build publishAggregationToCentralPortal
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          RIGHTSIZE_GPG_KEY: ${{ secrets.RIGHTSIZE_GPG_KEY }}
          RIGHTSIZE_GPG_PASSPHRASE: ${{ secrets.RIGHTSIZE_GPG_PASSPHRASE }}
